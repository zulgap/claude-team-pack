<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<!-- 레이아웃 B — 좌텍스트·우인물. 실측: 엔노블 talking-head, 가연 인터뷰 2샷
     인물은 오른쪽, 텍스트는 왼쪽 절반 (2~3줄). 배경 위에 인물 사진 합성한 경우도 이 골격 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* {{BASE_CSS}} */
html, body { width: 1280px; height: 720px; overflow: hidden; }
.thumb { position: relative; width: 1280px; height: 720px; overflow: hidden; background: #111; }

/* 좌측 텍스트 대비 스크림 */
.scrim-left { background: linear-gradient(100deg, rgba(0,0,0,.9) 0%, rgba(0,0,0,.55) 46%, rgba(0,0,0,0) 70%); }

/* 제목: 왼쪽 절반, 세로 중앙, 2~3줄. 실측 ≈ 92px */
.title-box { position: absolute; left: 58px; top: 50%; transform: translateY(-50%); width: 660px; }
.title { font-size: 92px; }
.title .l2 { display: block; }

/* 서브카피: 제목 아래 (선택) */
.subtitle { position: absolute; left: 58px; bottom: 40px; right: 560px; font-size: 40px; }
</style>
</head>
<body>
  <div class="thumb {{ACC_CLASS}}">
    <img class="bg" src="{{background_url}}" alt="">
    <div class="scrim-left"></div>
    {{QUOTES}}
    <div class="title-box"><div class="title" id="title">{{{title_html}}}</div></div>
    {{#if subtitle}}<div class="subtitle">{{subtitle}}</div>{{/if}}
    {{#if role}}<div class="role-label">({{role}})</div>{{/if}}
    {{#if channel}}<div class="watermark">{{channel}}</div>{{/if}}
  </div>
  <script>
    (function () {
      function fit() {
        var el = document.getElementById('title'); if (!el) return;
        var box = el.parentElement; var maxH = 560; var size = 92, floor = 52;
        el.style.fontSize = size + 'px';
        while ((el.scrollWidth > box.clientWidth || el.scrollHeight > maxH) && size > floor) {
          size -= 3; el.style.fontSize = size + 'px';
        }
      }
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
      else window.addEventListener('load', fit);
      setTimeout(fit, 400);
    })();
  </script>
</body>
</html>
